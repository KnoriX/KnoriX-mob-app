name: KnoriX Release Build

on:
  workflow_dispatch:
    inputs:
      version_note:
        description: "Release note (optional)"
        required: false
        default: ""

jobs:
  # ─────────────────────────────────────────────────────────────
  # Quality gate — runs first. If this fails, the build job never
  # starts, so no signing/Gradle time is wasted on broken code.
  # ─────────────────────────────────────────────────────────────
  quality-check:
    name: Lint, Typecheck & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Dependencies
        run: npm install --legacy-peer-deps
        # patches/ (react-native-reanimated, react-native-worklets,
        # react-native-track-player) are applied automatically here
        # via the "postinstall": "patch-package" script in package.json.
        # No inline patching needed anymore.

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --ci

  # ─────────────────────────────────────────────────────────────
  # Build — only runs if quality-check passes.
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build Production Release APK
    runs-on: ubuntu-latest
    needs: quality-check
    permissions:
      contents: write
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4

      - name: Install Dependencies
        run: npm install --legacy-peer-deps
        # Same as above — patches apply automatically via postinstall.

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Setup Release Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/knorix-release.keystore

      - name: Build Production Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"
        run: |
          cd android
          ./gradlew assembleRelease \
            --build-cache \
            --parallel \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/knorix-release.keystore \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Remove keystore file from workspace
        if: always()
        run: rm -f android/app/knorix-release.keystore

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "KnoriX Build #${{ github.run_number }}"
          files: android/app/build/outputs/apk/release/*.apk
          body: ${{ github.event.inputs.version_note }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
