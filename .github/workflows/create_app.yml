name: KnoriX Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  android:
    name: Create & Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install React Native CLI
        run: npm install -g react-native-cli @react-native-community/cli

      - name: Create KnoriX Project
        run: |
          npx @react-native-community/cli init KnoriX --version 0.73.0 --skip-install
          cp -r KnoriX/* .
          cp -r KnoriX/.* . 2>/dev/null || true
          rm -rf KnoriX

      - name: Install Project Dependencies
        run: npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/knoriX.keystore \
            -alias knoriX \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass KnoriX@mvpTest \
            -keypass KnoriX@mvpTest \
            -dname "CN=KnoriX, OU=Dev, O=KnoriX, L=India, S=India, C=IN"

      - name: Setup Signing Config
        run: |
          echo "MYAPP_UPLOAD_STORE_FILE=knoriX.keystore" >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_ALIAS=knoriX" >> android/gradle.properties
          echo "MYAPP_UPLOAD_STORE_PASSWORD=KnoriX@mvpTest" >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_PASSWORD=KnoriX@mvpTest" >> android/gradle.properties

      - name: Update build.gradle for Signing
        run: |
          sed -i '/buildTypes {/i\
              signingConfigs {\
                  release {\
                      storeFile file(MYAPP_UPLOAD_STORE_FILE)\
                      storePassword MYAPP_UPLOAD_STORE_PASSWORD\
                      keyAlias MYAPP_UPLOAD_KEY_ALIAS\
                      keyPassword MYAPP_UPLOAD_KEY_PASSWORD\
                  }\
              }' android/app/build.gradle
          sed -i 's/signingConfig signingConfigs.debug/signingConfig signingConfigs.release/' android/app/build.gradle

      - name: Make Gradlew Executable
        run: chmod +x android/gradlew

      - name: Build Signed Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KnoriX-Android-APK
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 7
