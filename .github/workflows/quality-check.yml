name: Lint, Typecheck & Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:   # manual trigger bhi available rahega, agar chahiye ho

jobs:
  quality-check:
    name: Lint, Typecheck & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Dependencies
        run: npm install --legacy-peer-deps
        # patches/ apply automatically via postinstall (patch-package)

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --ci
