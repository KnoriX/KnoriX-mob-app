name: Android Build & Publish

# Ye action tab run hoga jab tum 'main' branch me code push karoge
# 'workflow_dispatch' se tum ise GitHub website/app se manually bhi run kar sakte ho
on:
  push:
    branches:
      - main
  workflow_dispatch: 

jobs:
  build-android:
    name: Build and Release Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' # Agar tum koi aur version use karte ho toh change kar lena

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # React Native ke recent versions ke liye 17 best hai

      - name: Install Dependencies
        run: npm install
        # Agar tum yarn use karte ho toh 'npm install' ko hatakar 'yarn install' likh dena

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      # Ye step tumhare build kiye hue APK ko Action tab me save kar dega
      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

      # Ye step tumhare repository ke "Releases" section me APK ko public kar dega
      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          tag_name: Build-${{ github.run_number }}
          name: App Release Build ${{ github.run_number }}
          body: "Automated Release build generated via GitHub Actions."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
