name: Build APK
on:
  workflow_dispatch:

jobs:
  quality-check:
    name: Lint, Typecheck & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
      - run: npm install --legacy-peer-deps
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test -- --ci

  build:
    name: Build Release APK
    needs: quality-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        # patch-package runs automatically via postinstall — no inline patching needed

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Setup Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/knorix-release.keystore

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew assembleRelease --build-cache --parallel \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/knorix-release.keystore \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Remove keystore file from workspace
        if: always()
        run: rm -f android/app/knorix-release.keystore

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KnoriX-release
          path: android/app/build/outputs/apk/release/
