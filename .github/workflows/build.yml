name: Build APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── Install NDK ───────────────────────────────────────────────────────────
      - name: Install NDK
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;27.1.12297006"

      # ── THE REAL FIX: Replace SDK cmake 3.22.1 with cmake 3.31 ───────────────
      - name: Replace SDK cmake with newer version
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cmake ninja-build
          CMAKE_PATH=$(which cmake)
          NINJA_PATH=$(which ninja)
          echo "System cmake: $CMAKE_PATH ($(cmake --version | head -1))"
          SDK_CMAKE_DIR="$ANDROID_SDK_ROOT/cmake/3.22.1/bin"
          sudo mkdir -p "$SDK_CMAKE_DIR"
          echo "Replacing: $SDK_CMAKE_DIR/cmake"
          sudo cp "$CMAKE_PATH" "$SDK_CMAKE_DIR/cmake"
          sudo cp "$NINJA_PATH" "$SDK_CMAKE_DIR/ninja"
          "$SDK_CMAKE_DIR/cmake" --version

      # ── Accept Android SDK licenses ───────────────────────────────────────────
      - name: Accept Android licenses
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Clean and install dependencies
        run: |
          npm cache clean --force
          rm -rf node_modules
          npm install --legacy-peer-deps

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Setup Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/knorix-release.keystore

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/knorix-release.keystore \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KnoriX-release
          path: android/app/build/outputs/apk/release/
