# .github/workflows/generate-patches.yml (temporary — delete after use)
name: Generate Patches (one-time)
on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - run: npm install --legacy-peer-deps

      - name: Apply the fixes to node_modules
        run: |
          node -e "
          const fs = require('fs');
          const path = 'node_modules/react-native-reanimated/compatibility.json';
          const data = JSON.parse(fs.readFileSync(path, 'utf8'));
          Object.keys(data).forEach(key => {
            if (Array.isArray(data[key]['react-native']) && !data[key]['react-native'].includes('0.86')) {
              data[key]['react-native'].push('0.86');
            }
          });
          fs.writeFileSync(path, JSON.stringify(data, null, 2));
          "
          node -e "
          const fs = require('fs');
          const path = 'node_modules/react-native-worklets/compatibility.json';
          if (fs.existsSync(path)) {
            const data = JSON.parse(fs.readFileSync(path, 'utf8'));
            Object.keys(data).forEach(key => {
              if (Array.isArray(data[key]['react-native']) && !data[key]['react-native'].includes('0.86')) {
                data[key]['react-native'].push('0.86');
              }
            });
            fs.writeFileSync(path, JSON.stringify(data, null, 2));
          }
          "
          python3 - << 'EOF'
          path = "node_modules/react-native-track-player/android/src/main/java/com/doublesymmetry/trackplayer/module/MusicModule.kt"
          with open(path, "r") as f:
              content = f.read()
          content = content.replace(
              "callback.resolve(Arguments.fromBundle(musicService.tracks[index].originalItem))",
              "callback.resolve(musicService.tracks[index].originalItem?.let { Arguments.fromBundle(it) })"
          )
          content = content.replace(
              "            else Arguments.fromBundle(\n                musicService.tracks[musicService.getCurrentTrackIndex()].originalItem\n            )",
              "            else musicService.tracks[musicService.getCurrentTrackIndex()].originalItem?.let { Arguments.fromBundle(it) }"
          )
          with open(path, "w") as f:
              f.write(content)
          EOF

      - name: Generate patch files
        run: |
          npx patch-package react-native-reanimated
          npx patch-package react-native-worklets
          npx patch-package react-native-track-player

      - name: Commit patches back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add patches/
          git commit -m "chore: add patch-package patches for RN 0.86 compatibility"
          git push
